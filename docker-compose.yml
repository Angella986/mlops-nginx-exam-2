services:
  api_v1:
    build: ./src/api/v1
    container_name: api_v1
    ports:
      - "8001:8000"

  api_v2:
    build: ./src/api/v2
    container_name: api_v2
    ports:
      - "8002:8000"

  nginx:
    build: ./deployments/nginx
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api_v1
      - api_v2

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - nginx

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  prometheus_data:
  grafana_data:
